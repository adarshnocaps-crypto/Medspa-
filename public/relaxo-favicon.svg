<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Background circle with a transparent background -->
  <rect width="100" height="100" fill="transparent" />
  
  <!-- White elegant 'R' for Relaxo -->
  <text x="50%" y="55%" 
        dominant-baseline="middle" 
        text-anchor="middle" 
        fill="#ffffff" 
        font-family="system-ui, -apple-system, sans-serif" 
        font-size="80px" 
        font-weight="300"
        letter-spacing="-2px">
    R
  </text>
  <circle cx="50" cy="50" r="45" fill="none" stroke="#ffffff" stroke-width="4" opacity="0.8" />
</svg>
